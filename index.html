<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sales Monitoring</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>
<body>

<div class="container">

  <div class="topbar">

    <div>
      <h1>Sales Monitoring</h1>
      <p class="subtitle">
        CSV Analytics Dashboard
      </p>
    </div>

    <label class="upload-btn">

      Upload CSV

      <input
        type="file"
        id="csvFile"
        accept=".csv"
      >

    </label>

  </div>

  <div class="cards">

    <div class="card">
      <span>Total Sales</span>
      <h2 id="totalSales">Rp 0</h2>
    </div>

    <div class="card">
      <span>Total Qty</span>
      <h2 id="totalQty">0</h2>
    </div>

    <div class="card">
      <span>Total SKU</span>
      <h2 id="totalSku">0</h2>
    </div>

    <div class="card">
      <span>Total Item</span>
      <h2 id="totalItem">0</h2>
    </div>

  </div>

  <div class="search-box">

    <input
      type="text"
      id="searchInput"
      placeholder="Search SKU / Item Name"
    >

  </div>

  <div class="chart-box">

    <canvas id="salesChart"></canvas>

  </div>

  <div class="table-box">

    <h2>Sales By Item</h2>

    <table>

      <thead>

        <tr>
          <th>SKU</th>
          <th>Item</th>
          <th>Qty</th>
          <th>Sales</th>
        </tr>

      </thead>

      <tbody id="salesTable"></tbody>

    </table>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
